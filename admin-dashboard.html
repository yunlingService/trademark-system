<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台 - 商标管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a5276;--primary-light:#2980b9;--primary-dark:#0e2f44;--bg:#f0f4f8;--card-bg:#fff;--border:#e0e4e8;--text:#2c3e50;--text-light:#7f8c8d;--shadow:0 2px 8px rgba(0,0,0,.06);--radius:8px;--success:#059669;--warn:#d97706;--danger:#dc2626}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header-left{display:flex;align-items:center;gap:12px}
.header-left h1{font-size:1.1rem;font-weight:700;letter-spacing:1px}
.header-left .badge{font-size:.7rem;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:10px}
.header-right{display:flex;align-items:center;gap:10px}
.header-right .admin-name{font-size:.8rem;opacity:.9}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn-outline{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-outline:hover{background:rgba(255,255,255,.25)}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;font-size:.75rem}
.main{max-width:1400px;margin:0 auto;padding:20px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--card-bg);border-radius:12px;padding:16px 20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-card .stat-num{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-card .stat-label{font-size:.8rem;color:var(--text-light);margin-top:2px}
.tab-bar{display:flex;gap:4px;background:var(--card-bg);border-radius:10px;padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.tab-btn{padding:8px 18px;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-light)}
.tab-btn:hover{background:var(--bg);color:var(--text)}
.tab-btn.active{background:var(--primary);color:#fff}
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none}
.search-bar input:focus{border-color:var(--primary-light)}
.search-bar select{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;background:#fff;cursor:pointer}
.table-wrap{background:var(--card-bg);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead{background:#eff6ff}
th{text-align:left;padding:12px 14px;font-weight:700;color:var(--primary-dark);white-space:nowrap;border-bottom:2px solid var(--border);font-size:.75rem}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8fafc}
.status{padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600;display:inline-block}
.status-pending{background:#fef3c7;color:#92400e}
.status-processing{background:#dbeafe;color:#1e40af}
.status-done{background:#d1fae5;color:#065f46}
.user-group{background:#f1f5f9;font-weight:700;font-size:.85rem}
.user-group td{color:var(--primary-dark);padding-top:14px;padding-bottom:14px}
.user-group .user-count{font-weight:400;color:var(--text-light);font-size:.75rem}
.empty-state{text-align:center;padding:60px 20px;color:#a0aab4}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:800px;width:95%;max-height:90vh;overflow:auto;box-shadow:0 12px 48px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h2{font-size:1rem;color:var(--primary)}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-light);padding:4px;border-radius:4px}
.modal-close:hover{color:var(--text);background:var(--bg)}
.modal-body{padding:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.detail-grid{grid-template-columns:1fr}}
.detail-item{background:#f8fafc;border-radius:8px;padding:12px;border:1px solid var(--border)}
.detail-item .label{font-size:.7rem;color:var(--text-muted,#9ca3af);margin-bottom:4px}
.detail-item .value{font-size:.9rem;color:var(--text);font-weight:500;word-break:break-all}
.detail-item.full{grid-column:1/-1}
.detail-item .value-pre{white-space:pre-wrap;font-size:.8rem;line-height:1.6}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.settings-form .form-group{margin-bottom:14px}
.settings-form label{display:block;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:4px}
.settings-form input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;outline:none}
.toast-container{position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:8px;color:#fff;font-size:.85rem;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

/* ===== 网站装修响应式 ===== */
@media(max-width:768px){.deco-panel-bd .deco-editor{min-height:100px!important}.deco-panel-bd>div[style*="grid-template-columns"]{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<header class="header">
  <div class="header-left">
    <h1>&#128272; 管理员后台</h1>
    <span class="badge">商标管理系统</span>
  </div>
  <div class="header-right">
    <a href="trademark-query.html" class="btn btn-outline btn-sm">&#127760; 查询系统</a>
    <a href="power-attorney.html" class="btn btn-outline btn-sm">&#128203; 委托书</a>
    <button class="btn btn-outline btn-sm" onclick="showSettings()">&#9881; 设置</button>
    <span class="admin-name" id="adminNameDisplay"></span>
    <button class="btn btn-outline btn-sm" onclick="logout()">&#128682; 退出</button>
  </div>
</header>
<div id="fileProtocolWarning" style="display:none;background:#fff3cd;color:#856404;padding:10px 16px;font-size:.82rem;text-align:center;border-bottom:1px solid #ffc107">
  ⚠️ 当前通过文件协议打开，数据仅保存在内存中。建议使用 <a href="http://localhost:8765/admin-dashboard.html" style="color:#1a56db;font-weight:600">http://localhost:8765</a> 打开。
</div>
<div class="main">
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总提交数</div></div>
    <div class="stat-card"><div class="stat-num" id="statUsers">0</div><div class="stat-label">用户数</div></div>
    <div class="stat-card"><div class="stat-num" id="statPending">0</div><div class="stat-label">待处理</div></div>
    <div class="stat-card"><div class="stat-num" id="statToday">0</div><div class="stat-label">今日提交</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('all',this)">&#128220; 全部提交</button>
    <button class="tab-btn" onclick="switchTab('byuser',this)">&#128101; 按用户</button>
    <button class="tab-btn" onclick="switchTab('pending',this)">&#9203; 待处理</button>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索用户名、商标名称、编号..." oninput="renderAll()">
    <select id="statusFilter" onchange="renderAll()">
      <option value="all">全部状态</option>
      <option value="待处理">待处理</option>
      <option value="处理中">处理中</option>
      <option value="已完成">已完成</option>
    </select>
    <button class="btn btn-primary" onclick="renderAll()">&#128269; 搜索</button>
    <button class="btn btn-success" onclick="exportData()" style="background:#059669;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap">&#128230; 导出数据</button>
  </div>
  <div class="table-wrap" id="tableWrap">
    <div class="empty-state" id="emptyState"><div class="empty-icon">&#128203;</div><p>暂无提交记录</p></div>
    <div id="tableContent" style="display:none"></div>
  </div>
<!-- ===== 网站装修 ===== -->
<div class="deco-section" id="decoSection" style="margin-top:20px;border-top:2px solid #e5e7eb;padding-top:16px">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer;user-select:none" onclick="toggleDeco()">
    <span id="decoArrow" style="font-size:.9rem;color:var(--primary);transition:transform .3s">&#9654;</span>
    <h2 style="font-size:1.05rem;color:var(--primary);font-weight:700">🛠 网站装修</h2>
    <span style="font-size:.75rem;color:var(--text-light);background:#e5e7eb;padding:1px 10px;border-radius:10px">点击编辑</span>
  </div>
  <div id="decoBody" style="display:none">
    <p style="font-size:.8rem;color:var(--text-light);margin-bottom:14px">修改查询页面弹窗内容，保存后前台同步更新。支持电脑和手机。</p>
    <div id="decoContent"></div>
  </div>
</div>
</div>
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h2>&#128196; 申请详情</h2><button class="modal-close" onclick="closeDetail()">&times;</button></div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="max-width:460px">
    <div class="modal-header"><h2>&#9881; 管理员设置</h2><button class="modal-close" onclick="closeSettings()">&times;</button></div>
    <div class="modal-body">
      <div class="settings-form">
        <div class="form-group"><label>管理员账号</label><input type="text" id="setUsername" placeholder="admin"></div>
        <div class="form-group"><label>新密码</label><input type="password" id="setPassword" placeholder="输入新密码"></div>
        <div class="form-group"><label>确认新密码</label><input type="password" id="setPassword2" placeholder="再次输入新密码"></div>
        <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;justify-content:center;padding:10px">&#128190; 保存设置</button>
      </div>
    </div>
  </div>
</div>
<script>
// ===== 安全存储（兼容 file:// 协议下 localStorage 不可用）=====
var __ls = (function(){
  var _s = {};
  try { localStorage.getItem('_t'); return localStorage; } catch(e) {}
  return { getItem:function(k){return _s[k]||null;}, setItem:function(k,v){_s[k]=String(v);}, removeItem:function(k){delete _s[k];} };
})();
function _g(k){return __ls.getItem(k);}
function _s(k,v){__ls.setItem(k,v);}
function _r(k){__ls.removeItem(k);}
// 跨页面数据桥：从 window.name 读取提交的数据（兼容 file:/// 协议）
(function(){
  try {
    if (window.name && window.name.indexOf('TM_BRIDGE:') === 0) {
      var bridgeData = JSON.parse(window.name.substring(10));
      if (bridgeData && bridgeData.length) {
        var existing = JSON.parse(__ls.getItem('trademark_submissions') || '[]');
        // 去重：按 id 过滤已存在的数据
        var existingIds = {};
        existing.forEach(function(e){ existingIds[e.id] = true; });
        var newCount = 0;
        bridgeData.forEach(function(d){
          if (!existingIds[d.id]) { existing.unshift(d); newCount++; }
        });
        if (newCount > 0) {
          __ls.setItem('trademark_submissions', JSON.stringify(existing));
          console.log('📦 跨页面数据桥导入 ' + newCount + ' 条提交记录');
          // 延迟一点显示提示，等页面渲染完成
          setTimeout(function(){
            var n = document.createElement('div');
            n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;background:#d4edda;color:#155724;padding:14px 28px;border-radius:8px;font-size:15px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);border:1px solid #c3e6cb;animation:noticeIn .3s ease';
            n.textContent = '📦 检测到新提交数据，已自动导入 ' + newCount + ' 条记录';
            document.body.appendChild(n);
            setTimeout(function(){ n.style.opacity='0'; n.style.transition='opacity .5s'; setTimeout(function(){n.remove()},500); }, 4000);
          }, 100);
        }
        window.name = ''; // 清空桥数据
      }
    }
  } catch(e) { console.warn('跨页面数据桥读取失败:', e); }
})();
// 提示文件协议问题
try { localStorage.getItem('__test__'); } catch(e) {
  var w = document.getElementById('fileProtocolWarning');
  if (w) w.style.display = 'block';
}

(function(){
  var login = JSON.parse(_g('trademark_admin_login') || '{}');
  var token = _g('trademark_token');
  var timeout = 30 * 60 * 1000; // 30分钟无操作超时
  // 有 API token 或本地登录有效则通过
  if (!token && (!login.user || !login.time || (Date.now() - login.time > timeout))) {
    _r('trademark_admin_login');
    window.location.href = 'admin.html';
    return;
  }
  document.getElementById('adminNameDisplay').textContent = login.user || '管理员';
  // 启动时从服务器拉取数据
  setTimeout(function(){ syncSubmissionsFromServer(); }, 300);
  
  // 用户操作时刷新登录时间（操作为中心的超时）
  function refreshLogin() {
    var now = Date.now();
    var login = JSON.parse(_g('trademark_admin_login') || '{}');
    if (login.user) {
      login.time = now;
      _s('trademark_admin_login', JSON.stringify(login));
    }
  }
  document.addEventListener('click', refreshLogin);
  document.addEventListener('keydown', refreshLogin);
  document.addEventListener('mousemove', refreshLogin);
  document.addEventListener('scroll', refreshLogin);
})();
function getSubmissions(){try{return JSON.parse(_g('trademark_submissions')||'[]')}catch(e){return[]}}
function saveSubmissions(d){_s('trademark_submissions',JSON.stringify(d))}
// API 增强：从服务器拉取提交记录并合并到本地
function syncSubmissionsFromServer(){
  var token = _g('trademark_token');
  if (!token) return;
  fetch('/api/submissions', {headers:{'X-Token':token}})
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.ok && data.submissions && data.submissions.length){
      saveSubmissions(data.submissions);
      renderAll();
    }
  }).catch(function(){});
}
// 提交状态变更同步到服务器
function syncStatusToServer(id, status, notes){
  var token = _g('trademark_token');
  if(!token) return;
  fetch('/api/submissions/'+id+'/status', {
    method:'PUT', headers:{'Content-Type':'application/json','X-Token':token},
    body:JSON.stringify({status:status, notes:notes})
  }).catch(function(){});
}
// 删除同步到服务器
function syncDeleteToServer(id){
  var token = _g('trademark_token');
  if(!token) return;
  fetch('/api/submissions/'+id, {method:'DELETE', headers:{'X-Token':token}}).catch(function(){});
}
function updateStats(){var s=getSubmissions(),u=new Set(s.map(x=>x.submitterName)),t=new Date().toISOString().slice(0,10);document.getElementById('statTotal').textContent=s.length;document.getElementById('statUsers').textContent=u.size;document.getElementById('statPending').textContent=s.filter(x=>x.status==='待处理').length;document.getElementById('statToday').textContent=s.filter(x=>x.submittedAt&&x.submittedAt.slice(0,10)===t).length}
var currentTab='all';
function switchTab(t,b){currentTab=t;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderAll()}
function renderAll(){updateStats();var s=getSubmissions();if(!s.length){document.getElementById('emptyState').style.display='block';document.getElementById('tableContent').style.display='none';return}
document.getElementById('emptyState').style.display='none';document.getElementById('tableContent').style.display='block'
var q=document.getElementById('searchInput').value.trim().toLowerCase(),f=document.getElementById('statusFilter').value
var r=s;if(q)r=r.filter(x=>(x.submitterName||'').toLowerCase().includes(q)||(x.tmName||'').toLowerCase().includes(q)||(x.id||'').toLowerCase().includes(q));if(f!=='all')r=r.filter(x=>x.status===f)
if(currentTab==='byuser')renderByUser(r);else if(currentTab==='pending')renderTable(r.filter(x=>x.status==='待处理'));else{renderTable(r);document.querySelector('.search-bar').style.display='flex'}}
function renderTable(s){var h='<table><thead><tr><th style="width:30px"><input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll(this)" title="全选/取消"></th><th>编号</th><th>用户名</th><th>商标名称</th><th>类别</th><th>提交时间</th><th>文件</th><th>状态</th><th>操作</th></tr></thead><tbody>'
s.forEach(function(x){var c=(x.selectedClasses||[]).sort().map(function(n){return n+'类'}).join(', '),d=x.submittedAt?new Date(x.submittedAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-',sc=x.status==='待处理'?'status-pending':x.status==='处理中'?'status-processing':'status-done';selectedIds[x.id]=true
h+='<tr><td style="text-align:center;width:30px"><input type="checkbox" class="row-check" value="'+(x.id||'')+'" onchange="updateSelectedCount()"></td><td style="font-size:.7rem;font-family:monospace;color:var(--text-muted,#9ca3af)">'+(x.id||'-')+'</td><td><strong>'+esc(x.submitterName||'-')+'</strong></td><td>'+esc(x.tmName||'-')+'</td><td style="font-size:.7rem">'+c+'</td><td style="font-size:.7rem;color:var(--text-light)">'+d+'</td><td style="text-align:center">'+(x.fileCount||0)+'</td><td><span class="status '+sc+'">'+(x.status||'待处理')+'</span></td><td><button class="btn btn-primary btn-sm" onclick="showDetail(\''+x.id+'\')">&#128065; 详情</button><button class="btn btn-success btn-sm" onclick="genPackage(\''+x.id+'\')">📦 生成</button></td></tr>'})
h+='</tbody></table>';document.getElementById('tableContent').innerHTML=h}
function renderByUser(s){var m={};s.forEach(function(x){var n=x.submitterName||'未命名';if(!m[n])m[n]=[];m[n].push(x)})
var h='<table><thead><tr><th>编号</th><th>商标名称</th><th>类别</th><th>提交时间</th><th>状态</th><th>操作</th></tr></thead><tbody>'
Object.keys(m).sort().forEach(function(name){var items=m[name];h+='<tr class="user-group"><td colspan="6">&#128100; '+esc(name)+' <span class="user-count">('+items.length+' 条提交)</span></td></tr>'
items.forEach(function(x){var c=(x.selectedClasses||[]).sort().map(function(n){return n+'类'}).join(', '),d=x.submittedAt?new Date(x.submittedAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-',sc=x.status==='待处理'?'status-pending':x.status==='处理中'?'status-processing':'status-done';selectedIds[x.id]=true
h+='<tr><td style="font-size:.7rem;color:var(--text-muted,#9ca3af);font-family:monospace">'+(x.id||'')+'</td><td>'+esc(x.tmName||'-')+'</td><td style="font-size:.7rem">'+c+'</td><td style="font-size:.7rem;color:var(--text-light)">'+d+'</td><td><span class="status '+sc+'">'+(x.status||'待处理')+'</span></td><td><button class="btn btn-primary btn-sm" onclick="showDetail(\''+x.id+'\')">&#128065; 详情</button><button class="btn btn-success btn-sm" onclick="genPackage(\''+x.id+'\')">📦 生成</button></td></tr>'})})
h+='</tbody></table>';document.getElementById('tableContent').innerHTML=h}
function showDetail(id){var s=getSubmissions().find(function(x){return x.id===id});if(!s)return
var d=s.submittedAt?new Date(s.submittedAt).toLocaleString('zh-CN'):'-',c=(s.selectedClasses||[]).sort().map(function(n){return'第'+n+'类'}).join('、')||'未选择',t={legal:'法人/组织',natural:'自然人'}

function removeContact(idx) {

function removeQR(idx) {
  var items = document.querySelectorAll('.contact-item');
  if (!items[idx]) return;
  var col3 = items[idx].querySelector('div:nth-child(3)');
  if (!col3) return;
  var existingImg = col3.querySelector('img');
  var placeholder = col3.querySelector('div[style*="dashed"]');
  if (existingImg) {
    // 移除图片，换回占位框
    var ph = document.createElement('div');
    ph.style.cssText = 'width:280px;height:280px;border:2px dashed #d1d5db;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#d1d5db;font-size:.8rem;background:#fff';
    ph.textContent = '暂无二维码';
    col3.replaceChild(ph, existingImg);
    showToast('图片已删除', 'info');
  } else {
    showToast('没有图片需要删除', 'info');
  }
}

function uploadContactQR(idx, event) {
  var file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('图片超过2MB', 'error'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var items = document.querySelectorAll('.contact-item');
    if (!items[idx]) return;
    // col3 = 二维码列（第3列）
    var col3 = items[idx].querySelector('div:nth-child(3)');
    if (!col3) return;
    // 查找已有图片或占位div
    var existingImg = col3.querySelector('img');
    var placeholder = col3.querySelector('div[style*="dashed"]');
    var img = document.createElement('img');
    img.src = e.target.result;
    img.style.cssText = 'width:280px;height:280px;border:1px solid #e5e7eb;border-radius:8px;object-fit:contain;background:#fff';
    if (existingImg) {
      existingImg.src = e.target.result;
    } else if (placeholder) {
      // 替换占位div为图片
      col3.replaceChild(img, placeholder);
    } else {
      // 兜底：插入到上传按钮前面
      var btnRow = col3.querySelector('div:last-child');
      if (btnRow) col3.insertBefore(img, btnRow);
      else col3.appendChild(img);
    }
    showToast('二维码已上传，记得保存', 'success');
  };
  reader.readAsDataURL(file);
}

function getCurrentDisplayedCount() {
  var table = document.querySelector('#tableContent table');
  if (!table) return 0;
  return table.querySelectorAll('tbody tr').length;
}

function doExport() {
  var scope = document.querySelector('input[name="exportScope"]:checked');
  var format = document.querySelector('input[name="exportFormat"]:checked');
  if (!scope || !format) return;
  
  // Get selected columns
  var colChecks = document.querySelectorAll('.col-check:checked');
  if (!colChecks.length) { showToast('\u81f3\u5c11\u9009\u62e9\u4e00\u4e2a\u5b57\u6bb5', 'warn'); return; }
  var selectedCols = [];
  colChecks.forEach(function(cb) { selectedCols.push(cb.getAttribute('data-id')); });
  
  var allData = getSubmissions();
  var data;
  if (scope.value === 'all') {
    data = allData;
  } else if (scope.value === 'pending') {
    data = allData.filter(function(x){ return x.status === "\u5f85\u5904\u7406"; });
  } else if (scope.value === 'selected') {
    var ids = {};
    document.querySelectorAll('.row-check:checked').forEach(function(cb) { ids[cb.value] = true; });
    data = allData.filter(function(x){ return ids[x.id]; });
  } else {
    var ids = {};
    document.querySelectorAll('#tableContent table tbody tr').forEach(function(tr) {
      var firstTd = tr.querySelector('td:nth-child(2)');
      if (firstTd) ids[firstTd.textContent.trim()] = true;
    });
    data = allData.filter(function(x){ return ids[x.id]; });
  }
  
  if (!data.length) { showToast('\u6ca1\u6709\u6570\u636e\u53ef\u5bfc\u51fa', 'warn'); closeExportModal(); return; }
  
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate();
  
  // Column labels for header
  var colLabels = {
    id:'\u7f16\u53f7', submittedAt:'\u63d0\u4ea4\u65f6\u95f4', submitterName:'\u7528\u6237\u540d',
    principalName:'\u7533\u8bf7\u4eba', applicantType:'\u7c7b\u578b', contactPerson:'\u8054\u7cfb\u4eba',
    contactPhone:'\u7535\u8bdd', mailAddress:'\u5730\u5740', tmName:'\u5546\u6807\u540d\u79f0',
    tmType:'\u5546\u6807\u7c7b\u578b', selectedClasses:'\u6307\u5b9a\u7c7b\u522b',
    goodsServices:'\u5546\u54c1/\u670d\u52a1', selectedItems:'\u59d4\u6258\u4ee3\u7406\u4e8b\u9879', agencyName:'\u4ee3\u7406\u673a\u6784',
    fileCount:'\u6587\u4ef6\u6570', status:'\u72b6\u6001', notes:'\u5907\u6ce8'
  };
  
  function getFieldValue(obj, field) {
    if (field === 'applicantType') return obj.applicantType === 'legal' ? '\u6cd5\u4eba/\u7ec4\u7ec7' : obj.applicantType === 'natural' ? '\u81ea\u7136\u4eba' : '';
    if (field === 'tmType') return obj.tmType === 'text' ? '\u6587\u5b57\u5546\u6807' : obj.tmType === 'graphic' ? '\u56fe\u5f62\u5546\u6807' : '\u6587\u5b57+\u56fe\u5f62';
    if (field === 'selectedClasses') return (obj.selectedClasses||[]).sort().join('; ');
    if (field === 'selectedItems') return (obj.selectedItems||[]).join('; ');
    var v = obj[field];
    return v !== undefined && v !== null ? String(v) : '';
  }
  
  if (format.value === 'json') {
    // Filter data to only selected columns
    var filteredData = data.map(function(d) {
      var o = {};
      selectedCols.forEach(function(col) { o[col] = getFieldValue(d, col); });
      return o;
    });
    var blob = new Blob([JSON.stringify(filteredData, null, 2)], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '\u5546\u6807\u6570\u636e_' + dateStr + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('\u2705 \u5df2\u5bfc\u51fa ' + data.length + ' \u6761JSON\u6570\u636e', 'success');
  } else {
    // Build CSV header from selected columns
    var csvRows = [];
    var headerRow = selectedCols.map(function(col) { return escCsv(colLabels[col] || col); }).join(',');
    csvRows.push(headerRow);
    
    data.forEach(function(d) {
      var row = selectedCols.map(function(col) { return escCsv(getFieldValue(d, col)); }).join(',');
      csvRows.push(row);
    });
    
    var csvContent = '\uFEFF' + csvRows.join('\n');
    var blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '\u5546\u6807\u6570\u636e_' + dateStr + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('\u2705 \u5df2\u5bfc\u51fa ' + data.length + ' \u6761CSV\u6570\u636e', 'success');
  }
  closeExportModal();
}

function closeExportModal() {
  var body = document.getElementById('detailBody');
  var oldBody = body.dataset.oldBody || '';
  if (oldBody) body.innerHTML = oldBody;
  document.getElementById('detailModal').classList.remove('show');
  document.querySelector('.modal-close').onclick = function(){ closeDetail(); };
}

function escCsv(s) {
  if (!s) return '';
  s = String(s);
  if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
    s = '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
